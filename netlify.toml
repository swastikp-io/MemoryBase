[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "express", "serverless-http", "playwright", "playwright-core", "loudness", "chromium-bidi"]

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
